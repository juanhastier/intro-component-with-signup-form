<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Intro component with sign up form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="signup">
    <header class="signup__header">
      <h1 class="signup__title">Learn to code by watching others</h1>
      <p class="signup__description">See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.</p>
    </header>
    <section class="offer">
      <h2 class="offer__title">
        <span class="offer__highlight">Try it free 7 days</span>
        then $20/mo. thereafter
      </h2>
      <form class="form" novalidate>
        <div class="form__field">
          <label for="firstname" class="sr-only">First Name</label>
          <input class="form__input" type="text" name="firstname" id="firstname" placeholder="First Name" aria-invalid="false" aria-describedby="error-firstname">
          <span id="error-firstname" class="form__error" aria-live="polite"></span>
        </div>
        <div class="form__field">
          <label for="lastname" class="sr-only">Last Name</label>
          <input class="form__input" type="text" name="lastname" id="lastname" placeholder="Last Name" aria-invalid="false" aria-describedby="error-lastname">
          <span id="error-lastname" class="form__error" aria-live="polite"></span>
        </div>
        <div class="form__field">
          <label for="email" class="sr-only">Email</label>
          <input class="form__input" type="email" name="email" id="email" placeholder="Email Address" aria-invalid="false" aria-describedby="error-email">
          <span id="error-email" class="form__error" aria-live="polite"></span>
        </div>
        <div class="form__field">
          <label for="password" class="sr-only">Password</label>
          <input class="form__input" type="password" name="password" id="password" placeholder="Password" aria-invalid="false" aria-describedby="error-password">
          <span id="error-password" class="form__error" aria-live="polite"></span>
        </div>
        <button class="form__button" type="submit">Claim your free trial</button>
        <p class="form__term">By clicking the button, you are agreeing to our <a class="form__link" href="#">Terms and Services</a></p>
      </form>
    </section>
  </main>
</body>
</html>
